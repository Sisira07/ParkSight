name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline-and-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install parksight package + dev deps
        run: pip install -e .[dev]

      - name: Generate sample data (if missing)
        run: |
          if [ ! -f data/samples/sample_violations.csv ]; then
            echo "data/samples/sample_violations.csv not found — see docs/development.md to generate it."
            exit 1
          fi

      - name: Run pipeline integration tests
        run: pytest tests/pipeline -v

      - name: Install backend requirements
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: pytest backend/tests -v

      - name: Lint
        run: |
          pip install ruff
          ruff check parksight backend || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
