version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs:ro
      - ./config:/app/config:ro
      - ./data:/app/data:ro
    environment:
      - PARKSIGHT_OUTPUT_DIR=/app/outputs
      - PARKSIGHT_SETTINGS_PATH=/app/config/settings.yaml
      - PARKSIGHT_INPUT_CSV=/app/data/raw/violations.csv
      - FRONTEND_ORIGIN=http://localhost:5173
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    restart: unless-stopped
